version: '3.8'

services:
  # Base de dades MongoDB
  mongodb:
    image: mongo:latest
    container_name: bomberman_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - bomberman_network

  # Servei d'Autenticació
  servei-auth:
    build: 
      context: ./servei-auth
      dockerfile: Dockerfile
    container_name: servei-auth
    environment:
      - PORT=${AUTH_PORT}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - BCRYPT_SALT_ROUNDS=${BCRYPT_SALT_ROUNDS}
    depends_on:
      - mongodb
    networks:
      - bomberman_network

  # Servei de Joc
  servei-joc:
    build:
      context: ./servei-joc
      dockerfile: Dockerfile
    container_name: servei-joc
    environment:
      - PORT=${JOC_PORT}
      - MONGODB_URI=${MONGODB_URI}
    depends_on:
      - mongodb
    networks:
      - bomberman_network

  # Servei d'Estadístiques
  servei-estadistiques:
    build:
      context: ./servei-estadistiques
      dockerfile: Dockerfile
    container_name: servei-estadistiques
    environment:
      - PORT=${STATS_PORT}
      - MONGODB_URI=${MONGODB_URI}
    depends_on:
      - mongodb
    networks:
      - bomberman_network

  # Gateway (Nginx)
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "${GATEWAY_PORT}:80"
    depends_on:
      - servei-auth
      - servei-joc
      - servei-estadistiques
    networks:
      - bomberman_network

networks:
  bomberman_network:
    driver: bridge

volumes:
  mongo_data:
