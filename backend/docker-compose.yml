version: '3.8'

services:
  # Base de dades MongoDB
  mongodb:
    image: mongo:latest
    container_name: bomberman_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - bomberman_network

  # Servei d'Autenticació
  servei-auth:
  build: 
    context: ./servei-auth
    dockerfile: Dockerfile
  container_name: servei-auth
  ports:
    - "3001:3001"
  environment:
    - PORT=3001
    - MONGODB_URI=${MONGODB_URI}
    - JWT_SECRET=${JWT_SECRET}
    - BCRYPT_SALT_ROUNDS=${BCRYPT_SALT_ROUNDS}
  depends_on:
    - mongodb
  networks:
    - bomberman_network

servei-joc:
  build:
    context: ./servei-joc
    dockerfile: Dockerfile
  container_name: servei-joc
  ports:
    - "3002:3002"
  environment:
    - PORT=3002
    - MONGODB_URI=${MONGODB_URI}
  depends_on:
    - mongodb
  networks:
    - bomberman_network

servei-estadistiques:
  build:
    context: ./servei-estadistiques
    dockerfile: Dockerfile
  container_name: servei-estadistiques
  ports:
    - "3003:3003"
  environment:
    - PORT=3003
    - MONGODB_URI=${MONGODB_URI}
  depends_on:
    - mongodb
  networks:
    - bomberman_network

  # Gateway (Nginx)
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "${GATEWAY_PORT}:80"
    depends_on:
      - servei-auth
      - servei-joc
      - servei-estadistiques
    networks:
      - bomberman_network

networks:
  bomberman_network:
    driver: bridge

volumes:
  mongo_data:
