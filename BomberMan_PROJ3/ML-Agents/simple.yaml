behaviors:
  SimpleBehavior:
    trainer_type: ppo
    hyperparameters:
      batch_size: 128
      buffer_size: 2048
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true # CAMBIADO a true
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        strength: 0.05 # AJUSTADO para equilibrio
        gamma: 0.99
        network_settings:
          hidden_units: 128
    max_steps: 1000000 # AUMENTADO para maestría
    time_horizon: 128
    summary_freq: 5000